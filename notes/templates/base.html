<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园闲置时光胶囊</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        :root {
            --warm:#ff9f69;
            --bg:#fff9f2;
            --card:#ffffff;
            --text:#444;
            --border:#f2e5d7;
            --shadow:0 4px 12px rgba(0,0,0,0.06);
            --radius:16px;
        }
        body {
            font-family:"Microsoft YaHei",sans-serif;
            background:var(--bg);
            color:var(--text);
            line-height:1.6;
            padding-bottom:40px;
        }
        header {
            max-width:800px;
            margin:0 auto;
            padding:22px 15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:1px solid var(--border);
        }
        .logo {
            font-size:24px;
            font-weight:bold;
            color:var(--warm);
            text-decoration:none;
        }
        nav a {
            margin-left:16px;
            color:#555;
            text-decoration:none;
            font-size:15px;
        }
        nav a:hover {
            color:var(--warm);
        }
        main {
            max-width:800px;
            margin:0 auto;
            padding:25px 15px;
        }
        .card {
            background:var(--card);
            border-radius:var(--radius);
            padding:22px;
            margin-bottom:20px;
            box-shadow:var(--shadow);
            border:1px solid var(--border);
        }
        .card img {
            width:100%;
            border-radius:12px;
            margin:12px 0;
        }
        .btn {
            background:var(--warm);
            color:#fff;
            border:none;
            padding:10px 20px;
            border-radius:10px;
            cursor:pointer;
            font-size:15px;
            text-decoration:none;
            display:inline-block;
            margin-top:6px;
        }
        .btn:hover {
            background:#ffb98f;
        }
        form label {
            display:block;
            margin:16px 0 6px;
            font-weight:500;
        }
        input, textarea {
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:15px;
            outline:none;
        }
        input:focus, textarea:focus {
            border-color:var(--warm);
        }
        .flash {
            background:#e8f5e9;
            color:#2e7d32;
            padding:12px;
            border-radius:10px;
            text-align:center;
            margin-bottom:16px;
        }
        h2 {margin-bottom:18px;font-size:22px;}
        h3 {margin:28px 0 12px;font-size:18px;}
    </style>
</head>
<body>
    <header>
        <a href="{{ url_for('index') }}" class="logo">校园闲置时光胶囊</a>
        <nav>
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('item.publish') }}">发布闲置</a>
                <a href="{{ url_for('profile.index') }}">个人中心</a>
                <a href="{{ url_for('story.wall') }}">时光胶囊墙</a>
                <a href="{{ url_for('auth.logout') }}">退出</a>
            {% else %}
                <a href="{{ url_for('auth.register') }}">注册</a>
                <a href="{{ url_for('auth.login') }}">登录</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% with messages=get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
