<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}时光胶囊 - 管理员后台{% endblock %}</title>
    <!-- 引入 Lora, Caveat, Inter 字体及思源宋体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Noto+Serif+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            /* 调色盘同步前台治愈系复古风格 */
            --bg: #FDFBF7;              /* 暖沙纸张底色 */
            --sidebar-bg: #F6F0E6;       /* 稍深一些的温暖纸质色，用作左侧侧边栏 */
            --card-bg: #FFFFFF;         /* 卡片背景 */
            --border-color: #F2ECE4;    /* 纸张分割边框线 */
            --border: #F2ECE4;          /* 兼容性纸张分割线 */
            --accent: #D97706;         /* 焦糖琥珀主色 */
            --accent-hover: #B45309;   /* 深焦糖褐 */
            --primary-light: #FEF3C7;   /* 焦糖柔色 */
            --text-main: #2D251E;       /* 墨水深咖黑 */
            --text-mute: #7A6F62;       /* 暖灰色 */
            --shadow: 0 8px 24px rgba(139, 92, 26, 0.04); /* 松软纸质阴影 */
            --shadow-hover: 0 16px 32px rgba(139, 92, 26, 0.08);
            
            /* 圆角变量 */
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;

            --font-serif: "Lora", "Noto Serif SC", "Georgia", serif;
            --font-sans: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            --font-hand: "Caveat", "cursive", sans-serif;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
            box-shadow: 4px 0 16px rgba(139, 92, 26, 0.02);
        }
        .sidebar-brand {
            font-family: var(--font-serif);
            font-size: 20px;
            font-weight: 800;
            color: var(--accent-hover);
            text-decoration: none;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }
        .sidebar-brand span {
            background: var(--primary-light);
            color: var(--accent-hover);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid var(--accent);
        }
        .nav-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }
        .nav-item a {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--text-mute);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.25s ease;
            gap: 12px;
        }
        .nav-item a:hover {
            color: var(--accent-hover);
            background: rgba(217, 119, 6, 0.05);
        }
        .nav-item.active a {
            color: var(--accent-hover);
            background: var(--primary-light);
            font-weight: 600;
            box-shadow: none;
            border-left: 4px solid var(--accent);
            border-radius: 0 12px 12px 0;
            margin-left: -20px;
            padding-left: 32px;
        }
        .nav-footer a {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            color: var(--accent-hover);
            text-decoration: none;
            border-radius: 12px;
            border: 1px dashed var(--accent);
            transition: all 0.3s ease;
            font-weight: 600;
            justify-content: center;
        }
        .nav-footer a:hover {
            background: var(--accent);
            color: #FFFFFF;
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.15);
        }

        /* 主体内容 */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
            width: calc(100% - 260px);
        }
        
        /* 标题栏 */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 15px;
        }
        .content-title {
            font-family: var(--font-serif);
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        /* 全局消息弹窗样式 */
        .flash-container {
            margin-bottom: 25px;
        }
        .flash-message {
            background: #FDF4F5;
            border: 1px solid #FCE4E6;
            color: #BE123C;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* 纯白纸质感卡片布局 */
        .glass-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        /* 表格样式 */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            font-weight: 600;
            color: var(--text-mute);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #FCFAF5;
        }
        td {
            font-size: 14px;
            color: var(--text-main);
        }
        tr:hover td {
            background: rgba(217, 119, 6, 0.02);
        }

        /* 搜索框与按钮 */
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            max-width: 550px;
        }
        .search-input {
            flex-grow: 1;
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 12px 18px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.1);
        }
        .btn-action {
            background: var(--accent);
            color: #FFFFFF;
            font-weight: 600;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.165, 0.84, 0.44, 1);
            font-size: 15px;
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.12);
        }
        .btn-action:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 16px rgba(217, 119, 6, 0.2);
            color: #FFFFFF;
        }
        .btn-danger {
            background: #FFF1F2;
            color: #E11D48;
            border: 1px solid rgba(244, 63, 94, 0.15);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 13px;
        }
        .btn-danger:hover {
            background: #E11D48;
            color: #FFFFFF;
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.15);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 侧边导航栏 -->
    <div class="sidebar">
        <a href="{{ url_for('admin.dashboard') }}" class="sidebar-brand">
            时光胶囊 <span>ADMIN</span>
        </a>
        <ul class="nav-list">
            <li class="nav-item {% if request.path == '/admin/' or request.path == '/admin/dashboard' %}active{% endif %}">
                <a href="{{ url_for('admin.dashboard') }}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    控制台
                </a>
            </li>
            <li class="nav-item {% if '/admin/users' in request.path %}active{% endif %}">
                <a href="{{ url_for('admin.users') }}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    学生用户管理
                </a>
            </li>
            <li class="nav-item {% if '/admin/items' in request.path %}active{% endif %}">
                <a href="{{ url_for('admin.items') }}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                    发布物品审查
                </a>
            </li>
            <li class="nav-item {% if '/admin/stories' in request.path %}active{% endif %}">
                <a href="{{ url_for('admin.stories') }}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3c3.08 0 5.5 2.42 5.5 5.5 0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    故事墙审查
                </a>
            </li>
        </ul>
        <div class="nav-footer">
            <a href="{{ url_for('index') }}">
                返回前台首页
            </a>
        </div>
    </div>

    <!-- 主体区域 -->
    <div class="main-content">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-container">
                    {% for msg in messages %}
                        <div class="flash-message">
                            <span>{{ msg }}</span>
                            <span style="cursor:pointer;" onclick="this.parentElement.remove()">×</span>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
