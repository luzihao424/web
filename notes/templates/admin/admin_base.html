<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光胶囊 - 管理员后台</title>
    <!-- 引入 Outfit 现代英文字体 & 苹方/微软雅黑 中文字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --dark-bg: #0d1117;
            --sidebar-bg: #161b22;
            --card-bg: rgba(22, 27, 34, 0.7);
            --border-color: rgba(240, 134, 86, 0.15);
            --accent: #ff9f69;
            --accent-hover: #ffb98f;
            --text-main: #f0f6fc;
            --text-mute: #8b949e;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        body {
            font-family: 'Outfit', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--dark-bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .sidebar-brand {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
            text-decoration: none;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }
        .sidebar-brand span {
            background: rgba(255, 159, 105, 0.15);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid var(--accent);
        }
        .nav-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }
        .nav-item a {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            color: var(--text-mute);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            gap: 12px;
        }
        .nav-item a:hover {
            color: var(--text-main);
            background: rgba(255, 159, 105, 0.08);
        }
        .nav-item.active a {
            color: var(--dark-bg);
            background: var(--accent);
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 159, 105, 0.3);
        }
        .nav-footer a {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            color: var(--accent);
            text-decoration: none;
            border-radius: 12px;
            border: 1px dashed var(--accent);
            transition: all 0.3s ease;
            font-weight: 600;
            justify-content: center;
        }
        .nav-footer a:hover {
            background: var(--accent);
            color: var(--dark-bg);
            box-shadow: 0 4px 15px rgba(255, 159, 105, 0.3);
        }

        /* 主体内容 */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
            width: calc(100% - 260px);
        }
        
        /* 标题栏 */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .content-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* 全局消息弹窗样式 */
        .flash-container {
            margin-bottom: 25px;
        }
        .flash-message {
            background: rgba(255, 159, 105, 0.15);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px 20px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* 玻璃质感卡片布局 */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        /* 表格样式 */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        th {
            font-weight: 600;
            color: var(--text-mute);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            font-size: 15px;
            color: var(--text-main);
        }
        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* 搜索框与按钮 */
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            max-width: 500px;
        }
        .search-input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 18px;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-action {
            background: var(--accent);
            color: var(--dark-bg);
            font-weight: 600;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
        }
        .btn-action:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 15px rgba(255, 159, 105, 0.3);
        }
        .btn-danger {
            background: rgba(239, 83, 80, 0.15);
            color: #ef5350;
            border: 1px solid rgba(239, 83, 80, 0.3);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-danger:hover {
            background: #ef5350;
            color: #fff;
            box-shadow: 0 4px 15px rgba(239, 83, 80, 0.3);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 侧边导航栏 -->
    <div class="sidebar">
        <a href="{{ url_for('admin.dashboard') }}" class="sidebar-brand">
            时光胶囊 <span>ADMIN</span>
        </a>
        <ul class="nav-list">
            <li class="nav-item {% if request.path == '/admin/' or request.path == '/admin/dashboard' %}active{% endif %}">
                <a href="{{ url_for('admin.dashboard') }}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    控制台
                </a>
            </li>
            <li class="nav-item {% if '/admin/users' in request.path %}active{% endif %}">
                <a href="{{ url_for('admin.users') }}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    用户管理
                </a>
            </li>
            <li class="nav-item {% if '/admin/items' in request.path %}active{% endif %}">
                <a href="{{ url_for('admin.items') }}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                    物品审查
                </a>
            </li>
            <li class="nav-item {% if '/admin/stories' in request.path %}active{% endif %}">
                <a href="{{ url_for('admin.stories') }}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    故事墙审核
                </a>
            </li>
        </ul>
        <div class="nav-footer">
            <a href="{{ url_for('index') }}">
                返回前台首页
            </a>
        </div>
    </div>

    <!-- 主体区域 -->
    <div class="main-content">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-container">
                    {% for msg in messages %}
                        <div class="flash-message">
                            <span>{{ msg }}</span>
                            <span style="cursor:pointer;" onclick="this.parentElement.remove()">×</span>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
